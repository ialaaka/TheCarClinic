<html lang="en">
<head>
    <title>Contact Us - The Car Clinic</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
  box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    background-color:#E0E0E0;
    font-family: 'Times New Roman', Times, serif;
    min-height: 100vh;
    margin: 0;
    padding: 0;
   
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #E0E0E0;
    background-size: cover;
    background-attachment: fixed;
    filter: blur(6px); /* adjust blur level */
    z-index: -1; /* keeps it behind all content */
}


/* ================= HEADER (Same as Home) ================= */

header{
background:black;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
position:fixed;
top:0;
width:100%;
z-index:1000;
}

header img{
height:60px;
}

/* Style the topnav */
ul.topnav {
  display: flex;
  list-style-type: none;
  margin: 0;
  padding: 0;
  gap: 20px;
}

/* Style links in topnav */
ul.topnav li a {
  display: block;
  color: #f1f1f1;
  padding: 14px 16px;
  text-decoration: none;
  transition: all 0.3s ease;
}

/* Change color on hover */
ul.topnav li a:hover {
  color: #1100ff;
  border-bottom: 3px solid #1100ff;
  box-shadow: 0 0 10px hsla(240, 100%, 50%, 0.6);
  text-shadow: 0 0 10px hsla(240, 100%, 50%, 0.6);
}
/* ================= CONTACT SECTION ================= */

.contact-section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center; /* vertical center */
    align-items: center;     /* horizontal center */
    text-align: center;
    padding: 20px;
    margin-top: 80px;   /* space for header */
    margin-bottom: 60px; /* space for footer */
}

.contact-section h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.contact-section h1 span {
    color: #1100ff;
    text-shadow: 0 0 10px #1100ff, 0 0 20px #1100ff;
}

.contact-section p {
    font-size: 16px;
}

/* CONTACT CARDS */

.contact-container {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    margin-top: 40px;
}

.contact-card {
    background: #f9f7f7;
    padding: 30px;
    width: 250px;
    border-radius: 10px;
    border: 1px solid #1100ff;
    transition: 0.4s;
}

.contact-card:hover {
    box-shadow: 0 0 20px #1100ff, 0 0 40px #1100ff;
    transform: translateY(-10px);
}

.contact-card h3 {
    color: #1100ff;
    margin-bottom: 10px;
    font-size: 18px;
}

.contact-card p {
    font-size: 14px;
}

/* SOCIAL BUTTONS */

.social-section {
    margin-top: 50px;
}

.social-section h2 {
    font-size: 22px;
    margin-bottom: 20px;
}

.social-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.social-buttons a {
    padding: 12px 25px;
    border: 2px solid #1100ff;
    color: rgb(0, 0, 0);
    text-decoration: none;
    border-radius: 25px;
    font-size: 14px;
    transition: 0.3s;
}

.social-buttons a:hover {
    background: #1100ff;
    color: black;
    box-shadow: 0 0 15px #1100ff, 0 0 30px #1100ff;
}


footer{
background:black;
color:white;
text-align:center;
padding:15px;
}

</style>
</head>

<body>

<header>
   <img src="logo.png" alt="The Car Clinic Logo">

   </ul>
</header>

                <h3>Address</h3>
                <p>8746 Prince Sultan Street<br>Jeddah</p>
            </div>
        </a>

        <div class="contact-card">

        <div class="contact-card">

    </div>

    <div class="social-section">

        <div class="social-buttons">
            <a href="https://api.whatsapp.com/send?phone=966539940095" target="_blank">WhatsApp</a>

    </div>

</section>

<footer>
<p>&copy; <span id="year"></span> The Car Clinic</p>
</footer>

document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>

function translateToEnglish() {
    document.querySelector('.contact-section h1').innerHTML = 'Let Us <span>Help You</span>';
    document.querySelector('.contact-section p').textContent = 'We are here for all your car service needs.';
    document.querySelectorAll('.contact-card h3')[0].textContent = 'Address';

    document.querySelectorAll('.contact-card h3')[1].textContent = 'Email';

    document.querySelectorAll('.contact-card p')[2].textContent = '+966 53 994 0095';

    document.getElementById("year").textContent = new Date().getFullYear();

function toggleLanguage() {
    if (isArabic) {
        translateToEnglish();
    } else {
        translateToArabic();
    }
}
</script>
